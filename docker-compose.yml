version: '3.9'

services:
  poetry-app:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    image: poetry-app:latest
    container_name: poetry-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /app/data/poetry.db
      # JSON 在镜像内 /app；卷只持久化 SQLite，勿把 DATA_FILE 指到空卷路径
      DATA_FILE: /app/poetry_data.json
    volumes:
      - poetry-data:/app/data

volumes:
  poetry-data: